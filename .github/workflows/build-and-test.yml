name: Build And Run Core Unit Tests

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Debug
          - Release

jobs:
  build-and-test:
    name: Build and Test
    runs-on:
      - self-hosted
      - windows
      - prod
    env:
      BUILD_CONFIGURATION: ${{ inputs.build_configuration }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_COMMIT: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build and run core unit tests
        shell: powershell
        run: |
          $env:REPO_ROOT = (Get-Location).Path
          .\buildtools\scripts\pipelines\core-test-pipeline.ps1

      - name: Upload core test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-unit-artifacts
          path: |
            coverage.zip
            test-results.zip
            core-test-results/**/*.xml
            coverage/**/*.xml
            coverage/**/*
            artifacts/tests/**/*
          if-no-files-found: warn
