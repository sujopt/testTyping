name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  approval:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      REVIEWERS: ${{ vars.PROD_DEPLOY_REVIEWERS || secrets.PROD_DEPLOY_REVIEWERS }}
    steps:
      - name: Validate reviewer configuration
        run: |
          if [ -z "$REVIEWERS" ]; then
            echo "Set variable PROD_DEPLOY_REVIEWERS or secret PROD_DEPLOY_REVIEWERS." >&2
            exit 1
          fi

      - name: Require approval before production deploy
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ env.REVIEWERS }}
          minimum-approvals: 1
          issue-title: "Production deployment approval required"
          issue-body: "Approve this request to continue production deployment for run ${{ github.run_id }}."

  deploy-prod:
    needs: approval
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --prod \
            --dir=dist \
            --site=$NETLIFY_SITE_ID \
            --auth=$NETLIFY_AUTH_TOKEN
