name: Deploy STAGE

on:
  workflow_dispatch:
    inputs:
      deploy_message:
        description: "Deployment note"
        required: false
        default: "Manual deployment"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy STAGE
    runs-on: ubuntu-latest
    environment: stage
    env:
      BUILD_DIR: dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Resolve build output directory
        run: |
          if [ -d dist ]; then
            echo "BUILD_DIR=dist" >> "$GITHUB_ENV"
          elif [ -d build ]; then
            echo "BUILD_DIR=build" >> "$GITHUB_ENV"
          else
            echo "No build output found. Expected dist or build." >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

      - name: Deploy to STAGE
        run: 'echo "Deploying to STAGE: ${{ inputs.deploy_message }}"'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
